<!doctype html>
<html lang="ar">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>علي حسام • ملف شخصي</title>

<style>
:root{
  --bg:#0b0f14;
  --card:rgba(255,255,255,0.06);
  --text:#ffffff;
  --muted:rgba(255,255,255,0.7);
  --btn:#d7d7d7;
}

/* الخلفية */
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  transition:0.4s ease;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,150,255,0.18), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(120,0,255,0.12), transparent 45%),
    linear-gradient(135deg,#05070a,#0b0f14,#0d1118);
}

/* الوضع الفاتح */
body.light{
  --bg:#eaf2ff;
  --card:rgba(0,0,0,0.06);
  --text:#111;
  --muted:rgba(0,0,0,0.6);
  --btn:#6c5ce7;
}

/* الحاوية */
.container{
  max-width:900px;
  margin:auto;
  padding:30px;
  text-align:center;
}

/* البروفايل */
.profile{
  padding:25px;
  border-radius:18px;
  background:var(--card);
  border:1px solid rgba(255,255,255,0.08);
}

/* الصورة */
.avatar{
  width:170px;
  height:170px;
  margin:auto;
  border-radius:50%;
  overflow:hidden;
  border:3px solid rgba(255,255,255,0.2);
  box-shadow:0 0 25px rgba(0,150,255,0.3);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* الاسم */
h1{
  margin:12px 0 6px;
  font-size:28px;
}

/* الوصف */
.status{
  color:var(--muted);
  font-size:14px;
  margin-bottom:15px;
}

/* الأزرار */
.buttons{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:15px;
}

.btn{
  padding:12px;
  border-radius:12px;
  text-decoration:none;
  color:#000;
  background:var(--btn);
  font-weight:700;
  border:1px solid rgba(255,255,255,0.3);
  cursor:pointer;
}

.btn:hover{
  transform:translateY(-3px);
}

/* نافذة الشعر */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  background:var(--card);
  padding:25px;
  border-radius:15px;
  max-width:420px;
  width:85%;
  text-align:center;
  color:var(--text);
  line-height:2;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.close{
  cursor:pointer;
  font-size:18px;
  float:right;
}

/* صندوق الشعر القديم */
.poem{
  margin-top:20px;
  padding:20px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  line-height:2;
  color:var(--text);
}
</style>
</head>

<body>

<div class="container">

  <div class="profile">

    <div class="avatar">
      <img src="ttt.JPG">
    </div>

    <h1>علي حسام</h1>

    <div class="status">
      طالب في جامعة المستنصرية – اختصاص أمن سيبراني
    </div>

    <!-- الأزرار -->
    <div class="buttons">

      <button class="btn" onclick="randomPoem()">📜 أبيات شعرية عشوائية</button>

      <a class="btn" href="https://instagram.com/lr2_f" target="_blank">إنستغرام</a>
      <a class="btn" href="https://tiktok.com/@lr2_f" target="_blank">تيك توك</a>
      <a class="btn" href="https://t.me/lr2_f" target="_blank">تليجرام</a>
      <a class="btn" href="mailto:ddss10218@gmail.com">البريد الإلكتروني</a>

      <button class="btn" onclick="toggleMusic()">🎵 تشغيل الموسيقى</button>

      <button id="themeBtn" class="btn" onclick="toggleTheme()">🌙 الوضع الليلي</button>

    </div>

  </div>

</div>

<!-- نافذة الشعر -->
<div id="poetryModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closePoem()">✖ إغلاق</span>
    <div id="poetryText"></div>
  </div>
</div>

<!-- الموسيقى -->
<audio id="music" loop>
  <source src="ggg.mp3" type="audio/mpeg">
</audio>

<script>

const poems = [
`إذا غامَرْتَ في شَرَفٍ مَرُومِ<br>فَلا تَقنَعْ بِما دونَ النُّجُومِ — المتنبي`,
`ولقد ذكرتكِ والرماحُ نواهلٌ مني<br>وبِيضُ الهندِ تقطرُ من دمي — عنترة بن شداد`,
`دع الأيام تفعل ما تشاءُ<br>وطب نفساً إذا حكم القضاءُ — الإمام الشافعي`,
`خفف الوطء ما أظن أديم الأرض<br>إلا من هذه الأجساد — أبو العلاء المعري`
];

function randomPoem(){
  const rand = Math.floor(Math.random() * poems.length);
  document.getElementById("poetryText").innerHTML = poems[rand];
  document.getElementById("poetryModal").style.display = "flex";
}

function closePoem(){
  document.getElementById("poetryModal").style.display = "none";
}

const music = document.getElementById("music");

function toggleMusic(){
  if(music.paused){
    music.play();
  } else {
    music.pause();
  }
}

/* 🔥 زر الثيم المطوّر */
function toggleTheme(){
  document.body.classList.toggle("light");

  const btn = document.getElementById("themeBtn");

  if(document.body.classList.contains("light")){
    btn.innerHTML = "☀️ الوضع النهاري";
  } else {
    btn.innerHTML = "🌙 الوضع الليلي";
  }
}

</script>

</body>
</html>
