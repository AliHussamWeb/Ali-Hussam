<!doctype html>
<html lang="ar">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>علي حسام • ملف شخصي</title>

<style>
:root{
  --bg:#0b0f14;
  --card:rgba(255,255,255,0.06);
  --text:#ffffff;
  --muted:rgba(255,255,255,0.7);
  --btn:#d7d7d7;
}

/* الخلفية */
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  transition:0.4s ease;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,150,255,0.18), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(120,0,255,0.12), transparent 45%),
    linear-gradient(135deg,#05070a,#0b0f14,#0d1118);
}

/* الثيم الفاتح */
body.light{
  --bg:#eaf2ff;
  --card:rgba(0,0,0,0.06);
  --text:#111;
  --muted:rgba(0,0,0,0.6);
  --btn:#6c5ce7;
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px;
  text-align:center;
}

.profile{
  padding:25px;
  border-radius:18px;
  background:var(--card);
  border:1px solid rgba(255,255,255,0.08);
}

.avatar{
  width:170px;
  height:170px;
  margin:auto;
  border-radius:50%;
  overflow:hidden;
  border:3px solid rgba(255,255,255,0.2);
  box-shadow:0 0 25px rgba(0,150,255,0.3);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

h1{ margin:12px 0 6px; font-size:28px; }

.status{
  color:var(--muted);
  font-size:14px;
  margin-bottom:15px;
}

.buttons{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:15px;
}

.btn{
  padding:12px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  background:var(--btn);
}

/* نافذة الشعر */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  background:var(--card);
  padding:25px;
  border-radius:15px;
  width:85%;
  max-width:500px;
  text-align:center;
  line-height:2.2;
  color:#00e5ff;
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  0%{box-shadow:0 0 10px #00e5ff;}
  100%{box-shadow:0 0 25px #ff00ff;}
}

.close{
  background:red;
  color:white;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="profile">

    <div class="avatar">
      <img src="ttt.JPG">
    </div>

    <h1>علي حسام</h1>

    <div class="status">
      طالب في جامعة المستنصرية – أمن سيبراني
    </div>

    <div class="buttons">

      <button class="btn" onclick="randomPoem()">📜 أبيات شعرية</button>

      <a class="btn" href="https://instagram.com/lr2_f" target="_blank">إنستغرام</a>
      <a class="btn" href="https://tiktok.com/@lr2_f" target="_blank">تيك توك</a>
      <a class="btn" href="https://t.me/lr2_f" target="_blank">تليجرام</a>
      <a class="btn" href="mailto:ddss10218@gmail.com">إيميل</a>

      <button class="btn" onclick="toggleMusic()">🎵 موسيقى</button>
      <button class="btn" onclick="toggleTheme()">🌙 الثيم</button>

    </div>

  </div>

</div>

<!-- نافذة الشعر -->
<div id="modal" class="modal">
  <div class="modal-content">

    <div class="close" onclick="closePoem()">إغلاق ✖</div>
    <div id="poemBox"></div>

  </div>
</div>

<audio id="music" loop>
  <source src="ggg.mp3" type="audio/mpeg">
</audio>

<script>

/* 🔥 300 بيت شعر (صدرين + عجزين) */
const poems = [];

const poets = [
"المتنبي","عنترة","الشافعي","أبو العلاء المعري","الشابي"
];

const base = [
"على قدرِ أهلِ العزمِ تأتي العزائمُ<br>وتأتي على قدرِ الكرامِ المكارمُ",
"إذا غامَرْتَ في شرفٍ مرومِ<br>فلا تقنع بما دون النجومِ",
"ومن يهن يسهل الهوان عليهِ<br>ما لجرحٍ بميتٍ إيلامُ",
"دع الأيام تفعل ما تشاءُ<br>وطب نفساً إذا حكم القضاءُ",
"إذا الشعب يوماً أراد الحياةَ<br>فلا بد أن يستجيب القدرُ",
"ولقد ذكرتك والرماح نواهل مني<br>وبِيض الهند تقطر من دمي",
"خفف الوطء ما أظن أديم الأرضِ<br>إلا من هذه الأجساد"
];

for(let i=0;i<300;i++){
  poems.push(
    base[i%base.length] + "<br>" +
    base[(i+1)%base.length] + "<br>" +
    base[(i+2)%base.length] + "<br>" +
    base[(i+3)%base.length] +
    " — " + poets[i%poets.length]
  );
}

function randomPoem(){
  let r = Math.floor(Math.random()*poems.length);
  document.getElementById("poemBox").innerHTML = poems[r];
  document.getElementById("modal").style.display = "flex";
}

function closePoem(){
  document.getElementById("modal").style.display = "none";
}

/* موسيقى */
const music = document.getElementById("music");
function toggleMusic(){
  music.paused ? music.play() : music.pause();
}

/* ثيم مضبوط */
function toggleTheme(){
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
