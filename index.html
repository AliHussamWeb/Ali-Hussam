<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ali Hussam • Profile</title>

<style>
:root{
  --bg:#0b0f14;
  --card:rgba(255,255,255,0.06);
  --text:#ffffff;
  --muted:rgba(255,255,255,0.7);
  --btn:#d7d7d7;
}

/* BACKGROUND */
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  transition:0.4s ease;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,150,255,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(120,0,255,0.12), transparent 45%),
    linear-gradient(135deg,#05070a,#0b0f14,#0d1118);
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:30px;
  text-align:center;
}

/* PROFILE */
.profile{
  padding:25px;
  border-radius:18px;
  background:var(--card);
  border:1px solid rgba(255,255,255,0.08);
}

/* IMAGE */
.avatar{
  width:150px;
  height:150px;
  margin:auto;
  border-radius:50%;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.2);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* NAME */
h1{
  margin:12px 0 6px;
  font-size:28px;
}

/* STATUS */
.status{
  color:var(--muted);
  font-size:14px;
  margin-bottom:15px;
}

/* BUTTONS */
.buttons{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:15px;
}

.btn{
  padding:12px;
  border-radius:12px;
  text-decoration:none;
  color:#000;
  background:var(--btn);
  font-weight:700;
  transition:0.2s;
  border:1px solid rgba(255,255,255,0.3);
}

.btn:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

/* POEM */
.poem{
  margin-top:20px;
  padding:20px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  line-height:2;
}

/* THEME DARK/LIGHT FIX */
.light{
  background:#e9f1ff;
  color:#000;
}

.light body{
  background:#e9f1ff;
}

.light .profile,
.light .poem{
  background:rgba(0,0,0,0.05);
}

.light .btn{
  background:#fff;
  color:#000;
}
</style>
</head>

<body>

<div class="container">

  <div class="profile">

    <div class="avatar">
      <img src="ttt.JPG">
    </div>

    <h1>Ali Hussam</h1>

    <div class="status">
      Cyber Security Student at Al-Mustansiriya University
    </div>

    <!-- BUTTONS ONLY -->
    <div class="buttons">

      <a class="btn" href="https://instagram.com/lr2_f" target="_blank">Instagram</a>
      <a class="btn" href="https://tiktok.com/@lr2_f" target="_blank">TikTok</a>
      <a class="btn" href="https://t.me/lr2_f" target="_blank">Telegram</a>
      <a class="btn" href="mailto:ddss10218@gmail.com">Email</a>

      <button class="btn" onclick="toggleTheme()">Toggle Theme</button>

    </div>

  </div>

  <!-- POEM -->
  <div class="poem">
وَلا تَمشِ فَوقَ الأَرضِ إِلّا تَواضُعاً<br>
فَكَم تَحتَها قَومٌ هُم مِنكَ أَرفَعُ<br><br>
فَإِن كُنتَ في عِزٍّ وَخَيرٍ وَمَنعَةٍ<br>
فَكَم ماتَ مِن قَومٍ هُم مِنكَ أَوضَعُ
  </div>

</div>

<script>
function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
