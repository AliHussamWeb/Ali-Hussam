<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Hussam • Mode System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  transition:0.5s;
  overflow-y:auto;
}

/* 🌌 background */
.bg{
  position:fixed;
  inset:0;
  z-index:-1;
  filter:blur(40px);
}

/* containers */
.container{
  text-align:center;
  padding:50px 20px;
}

.avatar{
  width:120px;
  height:120px;
  margin:auto;
  border-radius:50%;
  overflow:hidden;
  border:2px solid white;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* cards */
.card{
  width:260px;
  margin:10px auto;
  padding:15px;
  border-radius:12px;
  transition:0.3s;
}

/* buttons */
button{
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="container">

  <div class="avatar">
    <img src="ttt.jpg">
  </div>

  <h1 id="name">Ali Hussam</h1>

  <p>Football Player • Poet • Ambitious</p>

  <!-- 🎛️ MODES -->
  <button onclick="dark()">Dark</button>
  <button onclick="cyber()">Cyber</button>
  <button onclick="neon()">Neon</button>

  <div class="card">
    <a href="https://instagram.com/lr2_f">Instagram</a>
  </div>

  <div class="card">
    <a href="https://tiktok.com/@lr2_f">TikTok</a>
  </div>

</div>

<script>

function dark(){
  document.body.style.background="#000";
  document.getElementById("bg").style.background=
    "radial-gradient(circle, rgba(255,0,0,0.2), transparent)";
  document.getElementById("name").style.textShadow="0 0 10px red";
}

function cyber(){
  document.body.style.background="#050816";
  document.getElementById("bg").style.background=
    "radial-gradient(circle, rgba(0,255,255,0.2), transparent)";
  document.getElementById("name").style.textShadow="0 0 10px cyan";
}

function neon(){
  document.body.style.background="#120012";
  document.getElementById("bg").style.background=
    "radial-gradient(circle, rgba(255,0,255,0.25), transparent)";
  document.getElementById("name").style.textShadow="0 0 10px magenta";
}

</script>

</body>
</html>
