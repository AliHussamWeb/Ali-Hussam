<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Profile</title>

<style>
:root{
  --bg1:#05070f;
  --bg2:#0a0f1f;
  --card:rgba(255,255,255,0.06);
  --text:#ffffff;
  --accent:#4da3ff;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--text);
  transition:0.4s;
  min-height:100vh;
}

/* light mode */
body.light{
  --bg1:#d7e6ff;
  --bg2:#f5f7ff;
  --card:rgba(0,0,0,0.06);
  --text:#111;
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px;
}

/* HEADER */
.header{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:15px;
  padding:25px;
  border-radius:18px;
  background:var(--card);
  backdrop-filter:blur(10px);
}

/* IMAGE CENTER BIG */
.avatar{
  width:160px;
  height:160px;
  border-radius:50%;
  overflow:hidden;
  border:3px solid var(--accent);
  box-shadow:0 0 25px rgba(77,163,255,0.5);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXT */
h1{
  margin:0;
  font-size:28px;
}

p{
  margin:5px 0;
  opacity:0.8;
}

/* BUTTONS */
.buttons{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-top:10px;
}

.btn{
  padding:10px 14px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  text-decoration:none;
  color:white;
  font-weight:600;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

/* COLORS */
.ig{background:#e1306c;}
.tt{background:#000;}
.tg{background:#229ed9;}
.mail{background:#ffb703;}
.music{background:#00b4d8;}
.theme{background:#6a4c93;}

/* FOOTER */
footer{
  margin-top:30px;
  text-align:center;
  opacity:0.85;
  line-height:1.8;
  font-size:15px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">

    <div class="avatar">
      <img src="ttt.JPG" alt="profile">
    </div>

    <h1>Ali Hussam</h1>
    <p>Football Player • Poet • Ambitious</p>

    <div class="buttons">

      <a class="btn ig" href="https://instagram.com/lr2_f" target="_blank">Instagram</a>
      <a class="btn tt" href="https://tiktok.com/@lr2_f" target="_blank">TikTok</a>
      <a class="btn tg" href="https://t.me/lr2_f" target="_blank">Telegram</a>
      <a class="btn mail" href="mailto:ddss10218@gmail.com">Email</a>

      <button class="btn music" onclick="toggleMusic()">Music</button>
      <button class="btn theme" onclick="toggleTheme()">Theme</button>

    </div>

  </div>

  <footer>
وَلا تَمشِ فَوقَ الأَرضِ إِلّا تَواضُعاً<br>
فَكَم تَحتَها قَومٌ هُم مِنكَ أَرفَعُ<br>
فَإِن كُنتَ في عِزٍّ وَخَيرٍ وَمَنعَةٍ<br>
فَكَم ماتَ مِن قَومٍ هُم مِنكَ أَوضَعُ
  </footer>

</div>

<audio id="music" src="ggg.mp3"></audio>

<script>
const music=document.getElementById("music");

function toggleMusic(){
  if(music.paused) music.play();
  else music.pause();
}

function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
