<!doctype html>
<html lang="ar">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>علي حسام • ملف شخصي</title>

<style>
:root{
  --bg:#0b0f14;
  --card:rgba(255,255,255,0.06);
  --text:#ffffff;
  --muted:rgba(255,255,255,0.7);
  --btn:#d7d7d7;
}

/* الخلفية */
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  transition:0.4s ease;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,150,255,0.18), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(120,0,255,0.12), transparent 45%),
    linear-gradient(135deg,#05070a,#0b0f14,#0d1118);
}

/* 🌟 الثيم الفاتح (مصحح بالكامل) */
body.light{
  --bg:#f4f9ff;
  --card:rgba(255,255,255,0.9);
  --text:#111;
  --muted:#333;
  --btn:#00a8cc;
}

/* منع اختفاء النص */
h1, .status, a, button{
  color:inherit;
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px;
  text-align:center;
}

.profile{
  padding:25px;
  border-radius:18px;
  background:var(--card);
  border:1px solid rgba(255,255,255,0.08);
}

.avatar{
  width:170px;
  height:170px;
  margin:auto;
  border-radius:50%;
  overflow:hidden;
  border:3px solid rgba(255,255,255,0.2);
  box-shadow:0 0 25px rgba(0,150,255,0.3);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

h1{margin:10px 0;}

.status{color:var(--muted);}

.buttons{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:15px;
}

.btn{
  padding:12px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  background:var(--btn);
}

/* نافذة الشعر */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  padding:25px;
  border-radius:15px;
  width:85%;
  max-width:500px;
  text-align:center;
  line-height:2.2;
  color:white;
}

.close{
  background:red;
  color:white;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:10px;
}

/* ألوان الشعر */
.c1{background:#00e5ff22;color:#00e5ff;}
.c2{background:#ff005522;color:#ff0055;}
.c3{background:#ffe60022;color:#ffe600;}
.c4{background:#00ff8822;color:#00ff88;}

/* المربع الذهبي */
.footer-box{
  margin-top:30px;
  padding:18px;
  background:linear-gradient(135deg,#ffd700,#ffcc33);
  color:#1a1a1a;
  font-weight:bold;
  border-radius:14px;
  text-align:center;
  box-shadow:0 0 15px rgba(255,215,0,0.6);
}

</style>
</head>

<body>

<div class="container">

  <div class="profile">

    <div class="avatar">
      <img src="ttt.JPG">
    </div>

    <h1>علي حسام</h1>

    <div class="status">
      طالب في جامعة المستنصرية – أمن سيبراني
    </div>

    <div class="buttons">

      <button class="btn" onclick="randomPoem()">📜 أبيات شعرية</button>

      <a class="btn" href="https://instagram.com/lr2_f">إنستغرام</a>
      <a class="btn" href="https://tiktok.com/@lr2_f">تيك توك</a>
      <a class="btn" href="https://t.me/lr2_f">تليجرام</a>
      <a class="btn" href="mailto:ddss10218@gmail.com">إيميل</a>

      <button class="btn" onclick="toggleMusic()">🎵 موسيقى</button>
      <button class="btn" onclick="toggleTheme()">🌙 ثيم</button>

    </div>

  </div>

  <!-- مربع النهاية -->
  <div class="footer-box">
    إنَّ خيرَ اللهِ قادمٌ فَاصبر ✨
  </div>

</div>

<!-- نافذة الشعر -->
<div id="modal" class="modal">
  <div id="box" class="modal-content">

    <div class="close" onclick="closePoem()">إغلاق ✖</div>
    <div id="poem"></div>

  </div>
</div>

<audio id="music" loop>
  <source src="ggg.mp3" type="audio/mpeg">
</audio>

<script>

/* الشعر */
const poems = [
{s:"على قدرِ أهلِ العزمِ تأتي العزائمُ",b:"وتأتي على قدرِ الكرامِ المكارمُ",p:"المتنبي"},
{s:"إذا غامَرْتَ في شرفٍ مرومِ",b:"فلا تقنع بما دون النجومِ",p:"المتنبي"},
{s:"ومن يهن يسهل الهوان عليهِ",b:"ما لجرحٍ بميتٍ إيلامُ",p:"المتنبي"},
{s:"دع الأيام تفعل ما تشاءُ",b:"وطب نفساً إذا حكم القضاءُ",p:"الشافعي"},
{s:"ولقد ذكرتك والرماح نواهل مني",b:"وبِيض الهند تقطر من دمي",p:"عنترة"},
{s:"إذا الشعب يوماً أراد الحياةَ",b:"فلا بد أن يستجيب القدرُ",p:"الشابي"},
{s:"خفف الوطء ما أظن أديم الأرضِ",b:"إلا من هذه الأجسادِ",p:"المعري"},
{s:"ألا كل شيء ما خلا الله باطلُ",b:"وكل نعيم لا محالة زائلُ",p:"لبيد بن ربيعة"}
];

/* عرض الشعر */
function randomPoem(){
  let i = Math.floor(Math.random()*poems.length);
  let p = poems[i];

  let colors=["c1","c2","c3","c4"];
  let c = colors[Math.floor(Math.random()*colors.length)];

  let box=document.getElementById("box");
  box.className="modal-content "+c;

  document.getElementById("poem").innerHTML =
    p.s + "<br>" + p.b + "<br><br>— " + p.p;

  document.getElementById("modal").style.display="flex";
}

function closePoem(){
  document.getElementById("modal").style.display="none";
}

/* موسيقى */
const music=document.getElementById("music");
function toggleMusic(){
  music.paused ? music.play() : music.pause();
}

/* الثيم */
function toggleTheme(){
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
