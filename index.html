<!doctype html>
<html lang="ar">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>علي حسام • ملف شخصي</title>

<style>
:root{
  --bg:#0b0f14;
  --card:rgba(255,255,255,0.06);
  --text:#ffffff;
  --muted:rgba(255,255,255,0.7);
  --btn:#d7d7d7;
}

/* الخلفية */
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  transition:0.4s ease;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,150,255,0.18), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(120,0,255,0.12), transparent 45%),
    linear-gradient(135deg,#05070a,#0b0f14,#0d1118);
}

/* الوضع الفاتح */
body.light{
  --bg:#eaf2ff;
  --card:rgba(0,0,0,0.06);
  --text:#111;
  --muted:rgba(0,0,0,0.6);
  --btn:#6c5ce7;
}

/* الحاوية */
.container{
  max-width:900px;
  margin:auto;
  padding:30px;
  text-align:center;
}

/* البروفايل */
.profile{
  padding:25px;
  border-radius:18px;
  background:var(--card);
  border:1px solid rgba(255,255,255,0.08);
}

/* الصورة */
.avatar{
  width:170px;
  height:170px;
  margin:auto;
  border-radius:50%;
  overflow:hidden;
  border:3px solid rgba(255,255,255,0.2);
  box-shadow:0 0 25px rgba(0,150,255,0.3);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* الاسم */
h1{
  margin:12px 0 6px;
  font-size:28px;
}

/* الوصف */
.status{
  color:var(--muted);
  font-size:14px;
  margin-bottom:15px;
}

/* الأزرار */
.buttons{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:15px;
}

.btn{
  padding:12px;
  border-radius:12px;
  text-decoration:none;
  color:#000;
  background:var(--btn);
  font-weight:700;
  border:1px solid rgba(255,255,255,0.3);
  cursor:pointer;
}

.btn:hover{
  transform:translateY(-3px);
}

/* نافذة الشعر */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:999;
}

/* صندوق الشعر */
.modal-content{
  background:var(--card);
  padding:30px;
  border-radius:18px;
  max-width:450px;
  width:85%;
  text-align:center;
  line-height:2;
  color:#00e5ff;
  font-size:18px;
  box-shadow:0 0 25px rgba(0,0,0,0.6);
  animation: glow 2s infinite alternate;
}

/* تأثير لون متحرك */
@keyframes glow{
  0%{box-shadow:0 0 10px #00e5ff;}
  100%{box-shadow:0 0 25px #ff00ff;}
}

/* زر الإغلاق */
.close{
  display:block;
  margin-bottom:15px;
  padding:10px;
  background:#ff3b3b;
  color:white;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.close:hover{
  background:#ff0000;
}
</style>
</head>

<body>

<div class="container">

  <div class="profile">

    <div class="avatar">
      <img src="ttt.JPG">
    </div>

    <h1>علي حسام</h1>

    <div class="status">
      طالب في جامعة المستنصرية – اختصاص أمن سيبراني
    </div>

    <div class="buttons">

      <button class="btn" onclick="randomPoem()">📜 أبيات شعرية عشوائية</button>

      <a class="btn" href="https://instagram.com/lr2_f" target="_blank">إنستغرام</a>
      <a class="btn" href="https://tiktok.com/@lr2_f" target="_blank">تيك توك</a>
      <a class="btn" href="https://t.me/lr2_f" target="_blank">تليجرام</a>

    </div>

  </div>

</div>

<!-- نافذة الشعر -->
<div id="poetryModal" class="modal">
  <div class="modal-content">

    <div class="close" onclick="closePoem()">✖ إغلاق</div>

    <div id="poetryText"></div>

    <br>
    <div style="color:#ffffff; margin-top:15px; font-size:16px;">
      إن خيرَ اللهِ قادمٌ فَاصبر ✨
    </div>

  </div>
</div>

<script>

/* أبيات الشعر */
const poems = [

`على قدرِ أهلِ العزمِ تأتي العزائمُ<br>وتأتي على قدرِ الكرامِ المكارمُ — المتنبي`,
`إذا غامَرْتَ في شرفٍ مرومٍ<br>فلا تقنعْ بما دونَ النجومِ — المتنبي`,
`ولقد ذكرتكِ والرماحُ نواهلٌ مني<br>وبِيضُ الهندِ تقطرُ من دمي — عنترة`,
`دع الأيام تفعل ما تشاءُ<br>وطب نفساً إذا حكم القضاءُ — الشافعي`,
`إذا الشعبُ يومًا أرادَ الحياةَ<br>فلا بدَّ أن يستجيبَ القدرُ — الشابي`,
`ومن يهن يسهلِ الهوانُ عليهِ<br>ما لجرحٍ بميتٍ إيلامُ — المتنبي`

];

/* عرض الشعر */
function randomPoem(){
  const rand = Math.floor(Math.random() * poems.length);
  document.getElementById("poetryText").innerHTML = poems[rand];
  document.getElementById("poetryModal").style.display = "flex";
}

/* إغلاق */
function closePoem(){
  document.getElementById("poetryModal").style.display = "none";
}

</script>

</body>
</html>
