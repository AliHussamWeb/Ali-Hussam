<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ali Hussam</title>

<style>
:root{
  --text:#fff;
}

body{
  margin:0;
  font-family:system-ui;
  color:var(--text);
  overflow-x:hidden;
  background:#05060a;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  z-index:-1;
  background:linear-gradient(-45deg,#05060a,#0a1230,#120a2a,#001b2e);
  background-size:400% 400%;
  animation:move 12s ease infinite;
  filter:blur(0px);
}

@keyframes move{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* ENTRY ANIMATION */
.container{
  max-width:900px;
  margin:auto;
  text-align:center;
  padding:30px;
  animation:fadeUp 1s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

/* IMAGE */
.avatar{
  width:180px;
  height:180px;
  margin:auto;
  border-radius:50%;
  overflow:hidden;
  border:3px solid rgba(0,200,255,0.8);
  box-shadow:0 0 30px rgba(0,200,255,0.5);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* NAME */
h1{
  margin:15px 0 5px;
  font-size:30px;
}

/* BUTTONS */
.buttons{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

.btn{
  padding:11px 15px;
  border-radius:14px;
  text-decoration:none;
  color:white;
  font-weight:600;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  transition:0.25s;
  cursor:pointer;
}

.btn:hover{
  transform:translateY(-4px) scale(1.03);
  box-shadow:0 0 18px rgba(0,200,255,0.4);
  border-color:rgba(0,200,255,0.8);
}

/* BUTTON COLORS */
.ig{background:linear-gradient(45deg,#ff3b7b,#ff7a00);}
.tt{background:#111;}
.tg{background:linear-gradient(45deg,#0088cc,#00c3ff);}
.mail{background:linear-gradient(45deg,#ffcc00,#ff8800);}
.theme{background:linear-gradient(45deg,#7a5cff,#00d4ff);}
.music{background:linear-gradient(45deg,#00ffcc,#0066ff);}

/* POEM */
.poem{
  margin-top:30px;
  padding:22px;
  border-radius:16px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  line-height:2;
  font-size:16px;
  animation:fadeUp 1.2s ease;
}

/* LIGHT MODE */
.light{
  background:#eaf2ff;
  color:#000;
}

.light .bg{
  background:linear-gradient(-45deg,#ffffff,#dbe9ff,#f3f7ff,#e6f0ff);
  background-size:400% 400%;
}

.light .poem{
  background:rgba(0,0,0,0.05);
}

.light .btn{
  color:#000;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

  <div class="avatar">
    <img src="ttt.JPG">
  </div>

  <h1>Ali Hussam</h1>

  <div class="buttons">
    <a class="btn ig" href="https://instagram.com/lr2_f" target="_blank">Instagram</a>
    <a class="btn tt" href="https://tiktok.com/@lr2_f" target="_blank">TikTok</a>
    <a class="btn tg" href="https://t.me/lr2_f" target="_blank">Telegram</a>
    <a class="btn mail" href="mailto:ddss10218@gmail.com">Email</a>

    <button class="btn theme" onclick="toggleTheme()">Theme</button>
    <button class="btn music" onclick="toggleMusic()">Music</button>
  </div>

  <div class="poem">
وَلا تَمشِ فَوقَ الأَرضِ إِلّا تَواضُعاً<br>
فَكَم تَحتَها قَومٌ هُم مِنكَ أَرفَعُ<br><br>
فَإِن كُنتَ في عِزٍّ وَخَيرٍ وَمَنعَةٍ<br>
فَكَم ماتَ مِن قَومٍ هُم مِنكَ أَوضَعُ
  </div>

</div>

<audio id="music" src="ggg.mp3"></audio>

<script>
const music=document.getElementById("music");

function toggleMusic(){
  if(music.paused) music.play();
  else music.pause();
}

function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
