<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ali Hussam</title>

<style>
:root{
  --text:#fff;
  --btn:#bfc7d5;      /* لون الأزرار (رصاصي فاتح أنيق) */
  --bg1:#050505;      /* أسود */
  --bg2:#2a2a2a;      /* رصاصي */
}

/* ===== BACKGROUND ===== */
body{
  margin:0;
  font-family:system-ui;
  color:var(--text);
  overflow-x:hidden;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
}

/* لمسة حركية خفيفة */
.bg{
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.04), transparent 45%);
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  text-align:center;
  padding:30px;
  animation:fade 0.8s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}

/* IMAGE */
.avatar{
  width:180px;
  height:180px;
  margin:auto;
  border-radius:50%;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.2);
  box-shadow:0 0 25px rgba(255,255,255,0.08);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* NAME */
h1{
  margin:15px 0;
  font-size:28px;
}

/* ===== BUTTONS (STYLE FAMOUS CLEAN) ===== */
.buttons{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

.btn{
  padding:11px 16px;
  border-radius:14px;
  text-decoration:none;
  color:#000;
  font-weight:700;

  /* لون موحد لكل الأزرار */
  background:var(--btn);

  border:1px solid rgba(255,255,255,0.3);

  /* ستايل مشاهير */
  box-shadow:
    0 5px 15px rgba(0,0,0,0.4),
    inset 0 0 8px rgba(255,255,255,0.3);

  transition:0.25s;
  backdrop-filter:blur(10px);
}

.btn:hover{
  transform:translateY(-4px) scale(1.03);
  box-shadow:
    0 10px 25px rgba(0,0,0,0.6),
    0 0 12px rgba(255,255,255,0.15);
}

/* POEM */
.poem{
  margin-top:30px;
  padding:20px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  line-height:2;
}

/* IMAGE STYLE FIX */
.avatar img{
  object-fit:cover;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

  <div class="avatar">
    <img src="ttt.JPG">
  </div>

  <h1>Ali Hussam</h1>

  <div class="buttons">
    <a class="btn" href="https://instagram.com/lr2_f">Instagram</a>
    <a class="btn" href="https://tiktok.com/@lr2_f">TikTok</a>
    <a class="btn" href="https://t.me/lr2_f">Telegram</a>
    <a class="btn" href="mailto:ddss10218@gmail.com">Email</a>
  </div>

  <div class="poem">
وَلا تَمشِ فَوقَ الأَرضِ إِلّا تَواضُعاً<br>
فَكَم تَحتَها قَومٌ هُم مِنكَ أَرفَعُ<br><br>
فَإِن كُنتَ في عِزٍّ وَخَيرٍ وَمَنعَةٍ<br>
فَكَم ماتَ مِن قَومٍ هُم مِنكَ أَوضَعُ
  </div>

</div>

</body>
</html>
