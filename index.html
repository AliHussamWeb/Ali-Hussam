<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ali Hussam • Profile</title>

<style>
:root{
  --bg:#0b0f14;
  --card:rgba(255,255,255,0.06);
  --text:#ffffff;
  --muted:rgba(255,255,255,0.7);
  --btn:#d7d7d7;
}

/* BACKGROUND */
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  transition:0.4s ease;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,150,255,0.18), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(120,0,255,0.12), transparent 45%),
    linear-gradient(135deg,#05070a,#0b0f14,#0d1118);
}

/* LIGHT MODE */
body.light{
  --bg:#eaf2ff;
  --card:rgba(0,0,0,0.06);
  --text:#111;
  --muted:rgba(0,0,0,0.6);
  --btn:#6c5ce7;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:30px;
  text-align:center;
}

/* PROFILE */
.profile{
  padding:25px;
  border-radius:18px;
  background:var(--card);
  border:1px solid rgba(255,255,255,0.08);
}

/* IMAGE */
.avatar{
  width:170px;
  height:170px;
  margin:auto;
  border-radius:50%;
  overflow:hidden;
  border:3px solid rgba(255,255,255,0.2);
  box-shadow:0 0 25px rgba(0,150,255,0.3);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* NAME */
h1{
  margin:12px 0 6px;
  font-size:28px;
}

/* STATUS */
.status{
  color:var(--muted);
  font-size:14px;
  margin-bottom:15px;
}

/* BUTTONS */
.buttons{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:15px;
}

.btn{
  padding:12px;
  border-radius:12px;
  text-decoration:none;
  color:#000;
  background:var(--btn);
  font-weight:700;
  border:1px solid rgba(255,255,255,0.3);
}

.btn:hover{
  transform:translateY(-3px);
}

/* POEM BOX */
.poem{
  margin-top:20px;
  padding:20px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  line-height:2;
  color:var(--text);
}
</style>
</head>

<body>

<div class="container">

  <div class="profile">

    <div class="avatar">
      <img src="ttt.JPG">
    </div>

    <h1>Ali Hussam</h1>

    <div class="status">
      طالب في جامعة المستنصرية – أمن سيبراني
    </div>

    <!-- BUTTONS -->
    <div class="buttons">

      <button class="btn" onclick="randomPoem()">📜 أبيات شعرية عشوائية</button>

      <a class="btn" href="https://instagram.com/lr2_f" target="_blank">Instagram</a>
      <a class="btn" href="https://tiktok.com/@lr2_f" target="_blank">TikTok</a>
      <a class="btn" href="https://t.me/lr2_f" target="_blank">Telegram</a>
      <a class="btn" href="mailto:ddss10218@gmail.com">Email</a>

      <button class="btn" onclick="toggleMusic()">🎵 Music</button>
      <button class="btn" onclick="toggleTheme()">Toggle Theme</button>

    </div>

  </div>

</div>

<!-- 📜 POETRY BOX (خارج البروفايل) -->
<div id="poetryBox" class="poem" style="display:none;"></div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="ggg.mp3" type="audio/mpeg">
</audio>

<script>

const poems = [
`إذا غامَرْتَ في شَرَفٍ مَرُومِ<br>فَلا تَقنَعْ بِما دونَ النُّجُومِ — المتنبي`,
`ولقد ذكرتكِ والرماحُ نواهلٌ مني<br>وبِيضُ الهندِ تقطرُ من دمي — عنترة`,
`دع الأيام تفعل ما تشاءُ<br>وطب نفساً إذا حكم القضاءُ — الشافعي`,
`خفف الوطء ما أظن أديم الأرض<br>إلا من هذه الأجساد — المعري`
];

function randomPoem(){
  const box = document.getElementById("poetryBox");
  const rand = Math.floor(Math.random() * poems.length);
  box.innerHTML = poems[rand];
  box.style.display = "block";
}

const music = document.getElementById("music");

function toggleMusic(){
  if(music.paused){
    music.play();
  } else {
    music.pause();
  }
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
