<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ali Hussam</title>

<style>
:root{
  --bg1:#05070f;
  --bg2:#070b18;
  --card:rgba(255,255,255,0.06);
  --text:#ffffff;
  --muted:rgba(255,255,255,0.7);
  --btn:#1b2a4a;
  --btn2:#0e1a33;
  --accent:#4da3ff;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;
  color:var(--text);
  background: radial-gradient(circle at top, #0a1430, #05070f 60%);
  overflow-x:hidden;
}

/* moving soft background shapes */
.bg{
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 30%, rgba(77,163,255,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,200,255,0.10), transparent 45%),
    radial-gradient(circle at 50% 100%, rgba(120,80,255,0.10), transparent 50%);
  filter:blur(60px);
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px;
  text-align:center;
}

/* PROFILE IMAGE */
.avatar{
  width:160px;
  height:160px;
  margin:auto;
  border-radius:50%;
  overflow:hidden;
  border:3px solid rgba(77,163,255,0.6);
  box-shadow:0 0 25px rgba(77,163,255,0.4);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* NAME */
h1{
  margin-top:15px;
  font-size:28px;
}

/* BUTTONS */
.buttons{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin-top:15px;
}

a.btn, button.btn{
  padding:10px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  background:linear-gradient(145deg,var(--btn),var(--btn2));
  color:white;
  text-decoration:none;
  cursor:pointer;
  transition:0.3s;
  font-weight:600;
}

a.btn:hover, button.btn:hover{
  transform:translateY(-3px);
  border-color:var(--accent);
  box-shadow:0 0 15px rgba(77,163,255,0.4);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  margin-top:25px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:14px;
  text-align:center;
}

/* POEM */
.poem{
  margin-top:30px;
  padding:20px;
  background:rgba(255,255,255,0.04);
  border-radius:15px;
  line-height:1.9;
  font-size:16px;
  border:1px solid rgba(255,255,255,0.1);
}

/* DARK MODE ALT */
.light{
  background:linear-gradient(180deg,#e9f2ff,#cfe3ff);
  color:#000;
}

.light .card,
.light .poem{
  background:rgba(0,0,0,0.05);
  color:#000;
}

.light a.btn,
.light button.btn{
  background:#ffffff;
  color:#000;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<!-- IMAGE -->
<div class="avatar">
  <img src="ttt.JPG" alt="profile">
</div>

<h1>Ali Hussam</h1>

<!-- BUTTONS -->
<div class="buttons">
  <a class="btn" href="https://instagram.com/lr2_f" target="_blank">Instagram</a>
  <a class="btn" href="https://tiktok.com/@lr2_f" target="_blank">TikTok</a>
  <a class="btn" href="https://t.me/lr2_f" target="_blank">Telegram</a>
  <a class="btn" href="mailto:ddss10218@gmail.com">Email</a>

  <button class="btn" onclick="toggleMusic()">Music</button>
  <button class="btn" onclick="toggleTheme()">Theme</button>
</div>

<!-- CARDS -->
<div class="grid">
  <div class="card">Instagram: @lr2_f</div>
  <div class="card">TikTok: @lr2_f</div>
  <div class="card">Telegram: @lr2_f</div>
  <div class="card">Email: ddss10218@gmail.com</div>
</div>

<!-- POEM -->
<div class="poem">
وَلا تَمشِ فَوقَ الأَرضِ إِلّا تَواضُعاً<br>
فَكَم تَحتَها قَومٌ هُم مِنكَ أَرفَعُ<br><br>

فَإِن كُنتَ في عِزٍّ وَخَيرٍ وَمَنعَةٍ<br>
فَكَم ماتَ مِن قَومٍ هُم مِنكَ أَوضَعُ
</div>

</div>

<!-- MUSIC -->
<audio id="music" src="ggg.mp3"></audio>

<script>
const music=document.getElementById("music");
let light=false;

function toggleMusic(){
  if(music.paused) music.play();
  else music.pause();
}

function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
